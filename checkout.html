<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Silaajeet</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <nav style="position: relative; border-bottom: 1px solid rgba(255,255,255,0.1);">
        <div class="logo">SILAAJEET</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="product.html">Shop</a></li>
            <li><a href="about.html">Our Story</a></li>
        </ul>
        <div class="nav-icons">
            <a href="checkout.html" style="color: var(--gold);"><i class="fas fa-shopping-cart"></i></a>
        </div>
    </nav>

    <div class="checkout-container" style="padding-top: 5rem;">
        <div class="checkout-form">
            <h2 style="font-size: 2rem; margin-bottom: 2rem; color: var(--gold);">Billing Details</h2>
            <form
                onsubmit="event.preventDefault(); alert('Thank you for your order!'); window.location.href='index.html';">
                <div style="display: flex; gap: 1rem;">
                    <div class="form-group" style="flex: 1;">
                        <label>First Name</label>
                        <input type="text" required>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>Last Name</label>
                        <input type="text" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" required>
                </div>

                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" required>
                </div>

                <div class="form-group">
                    <label>Street Address</label>
                    <input type="text" placeholder="House number and street name" required>
                </div>

                <div style="display: flex; gap: 1rem;">
                    <div class="form-group" style="flex: 1;">
                        <label>Town / City</label>
                        <input type="text" required>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>Postcode / ZIP</label>
                        <input type="text" required>
                    </div>
                </div>

                <h3 style="margin: 2rem 0 1rem; color: var(--gold);">Payment Method</h3>
                <div class="form-group">
                    <select required style="color: var(--text-primary); background: #111;">
                        <option value="cod">Cash on Delivery (COD)</option>
                        <option value="card">Credit / Debit Card</option>
                        <option value="bank">Bank Transfer</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-solid" style="width: 100%; border: none; cursor: pointer;">Place
                    Order Now</button>
            </form>
        </div>

        <div class="checkout-sidebar">
            <div class="order-summary">
                <h3 style="margin-bottom: 2rem; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem;">
                    Your Order</h3>

                <div class="order-item">
                    <span>Pure Himalayan Shilajit Resin<br><small style="color: var(--text-secondary);">20g x
                            1</small></span>
                    <span>Rs. 3,500</span>
                </div>

                <div class="order-item" style="border: none;">
                    <span>Subtotal</span>
                    <span>Rs. 3,500</span>
                </div>

                <div class="order-item">
                    <span>Shipping</span>
                    <span style="color: #2ecc71;">Free</span>
                </div>

                <div class="total">
                    <span>Total</span>
                    <span>Rs. 3,500</span>
                </div>

                <div style="margin-top: 2rem; color: var(--text-secondary); font-size: 0.85rem; line-height: 1.6;">
                    <i class="fas fa-lock" style="color: var(--gold); margin-right: 0.5rem;"></i> Secure Encrypted
                    Checkout<br>
                    <i class="fas fa-undo" style="color: var(--gold); margin-right: 0.5rem;"></i> 30-Day Money Back
                    Guarantee
                </div>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>

</html>
